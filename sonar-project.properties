sonar.projectKey=jmpangilinan_inventory-app
sonar.organization=jmpangilinan

sonar.sources=src
sonar.exclusions=src/api/**,src/test/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclude files that are covered by E2E tests, not unit tests
sonar.coverage.exclusions=\
  src/app/**,\
  src/components/ui/**,\
  src/components/shared/providers.tsx,\
  src/components/shared/sidebar.tsx,\
  src/components/shared/theme-toggle.tsx,\
  src/middleware.ts
